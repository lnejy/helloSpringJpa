<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>카테고리 등록</title>
    <style>
        body { font-family: 'Malgun Gothic', Arial, sans-serif; max-width: 500px; margin: 40px auto; padding: 0 20px; }
        h1 { border-bottom: 2px solid #4a90d9; padding-bottom: 10px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input[type="text"] { width: 100%; padding: 8px; box-sizing: border-box; }
        .error-msg { color: #e74c3c; font-size: 0.9em; margin-top: 5px; }
        .btn-area { margin-top: 20px; }
        .btn { padding: 8px 16px; background: #4a90d9; color: white; border: none; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>
<h1>새 카테고리 등록</h1>

<form th:action="@{/categories/create}" th:object="${categoryForm}" method="post">
    <div class="form-group">
        <label for="name">카테고리 이름</label>
        <input type="text" th:field="*{name}" placeholder="예: 생활용품"/>
        <div class="error-msg" th:errors="*{name}"></div>
    </div>

    <div class="btn-area">
        <button type="submit" class="btn">등록하기</button>
        <a th:href="@{/categories}" style="margin-left: 10px; color: #666;">취소</a>
    </div>
</form>

<hr>
<footer>
    <p th:text="${'실습 수행 일시: ' + #temporals.format(#temporals.createNow(), 'yyyy-MM-dd HH:mm:ss')} + ' | 학번: 2371263 | 성명: 원재연'"></p>
</footer>
</body>
</html>
