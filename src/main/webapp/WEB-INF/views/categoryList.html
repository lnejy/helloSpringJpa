<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>카테고리 관리</title>
    <style>
        body { font-family: 'Malgun Gothic', Arial, sans-serif; max-width: 800px; margin: 40px auto; padding: 0 20px; }
        h1 { border-bottom: 2px solid #4a90d9; padding-bottom: 10px; }
        .btn { display: inline-block; padding: 8px 16px; background: #4a90d9; color: white; text-decoration: none; border-radius: 4px; margin-bottom: 16px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; border-bottom: 1px solid #ddd; text-align: left; }
        th { background: #f8f9fa; }
        .alert-success { color: #155724; background-color: #d4edda; padding: 10px; margin-bottom: 10px; border-radius: 4px; }
        .alert-error { color: #721c24; background-color: #f8d7da; padding: 10px; margin-bottom: 10px; border-radius: 4px; }
        .btn-delete { color: #e74c3c; border: none; background: none; cursor: pointer; text-decoration: underline; }
    </style>
</head>
<body>
<h1>카테고리 관리</h1>

<div class="alert-success" th:if="${successMessage}" th:text="${successMessage}"></div>
<div class="alert-error" th:if="${errorMessage}" th:text="${errorMessage}"></div>

<a class="btn" th:href="@{/categories/create}">+ 새 카테고리 등록</a>
<a class="btn" style="background: #6c757d;" th:href="@{/products}">상품 목록으로</a>

<table>
    <thead>
    <tr>
        <th>ID</th>
        <th>카테고리 이름</th>
        <th>작업</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="cat : ${categories}">
        <td th:text="${cat.id}">1</td>
        <td th:text="${cat.name}">전자제품</td>
        <td>
            <form th:action="@{/categories/{id}/delete(id=${cat.id})}" method="post"
                  onsubmit="return confirm('정말 삭제하시겠습니까?');">
                <button type="submit" class="btn-delete">삭제</button>
            </form>
        </td>
    </tr>
    </tbody>
</table>

<hr>
<footer>
    <p th:text="${'실습 수행 일시: ' + #temporals.format(#temporals.createNow(), 'yyyy-MM-dd HH:mm:ss')} + ' | 학번: 2371263 | 성명: 원재연'"></p>
</footer>
</body>
</html>
